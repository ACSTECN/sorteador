
<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorteio ALX Entregas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#050816;
    --panel:rgba(255,255,255,.06);
    --panelBorder:rgba(255,255,255,.10);
    --surface:#0b1022;
    --text:#ffffff;
    --muted:rgba(255,255,255,.72);
    --blue:#0f5fff;
    --blue2:#004cff;
    --green:#00ff88;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    overflow-x:hidden;
    overflow-y:auto;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
}

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top left,#003cff33,transparent 30%),
    radial-gradient(circle at bottom right,#0011ff22,transparent 30%),
    var(--bg);
    z-index:-2;
}

.particles{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:#0f5fff;
    border-radius:50%;
    animation:float 10s linear infinite;
    opacity:.6;
}

@keyframes float{

    0%{
        transform:translateY(100vh) scale(0);
    }

    100%{
        transform:translateY(-10vh) scale(1);
    }
}

.container{

    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    padding:48px 20px;
}

.logo{

    font-size:55px;
    font-weight:900;

    text-transform:uppercase;

    margin-bottom:10px;

    color:#fff;

    text-shadow:0 0 24px #0f5fff66, 0 0 50px #0f5fff33;
}

.logo span{
    color:#0f5fff;
}

.subtitle{

    opacity:.85;
    color:var(--muted);
    letter-spacing:.12em;
    text-transform:uppercase;
    font-size:12px;

    margin-bottom:40px;
}

.card{

    width:100%;
    max-width:850px;

    background:var(--panel);

    border:1px solid var(--panelBorder);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:40px;

    box-shadow:0 0 50px rgba(0,0,0,.45);
    position:relative;
    overflow:hidden;
}

.card:before{
    content:'';
    position:absolute;
    inset:-2px;
    background:linear-gradient(135deg, #0f5fff22, transparent 40%, #00ff8822);
    pointer-events:none;
    filter:blur(18px);
    opacity:.8;
}

textarea{

    width:100%;
    height:180px;

    background:linear-gradient(180deg, rgba(11,16,34,.95), rgba(11,16,34,.78));

    border:1px solid rgba(255,255,255,.10);
    outline:none;

    resize:none;

    color:white;

    padding:20px;

    border-radius:15px;

    font-size:14px;
    line-height:1.45;
    transition:border-color .2s, box-shadow .2s, transform .2s;
}

textarea:focus{
    border-color:#0f5fff66;
    box-shadow:0 0 0 4px #0f5fff1f, 0 0 24px #0f5fff22;
    transform:translateY(-1px);
}

.fetch{

    display:flex;

    gap:12px;

    margin-bottom:16px;

    flex-wrap:wrap;
}

.fetch input{

    flex:1;

    min-width:240px;

    height:52px;

    background:linear-gradient(180deg, rgba(11,16,34,.95), rgba(11,16,34,.78));

    border:1px solid rgba(255,255,255,.10);
    outline:none;

    color:white;

    padding:0 16px;

    border-radius:15px;

    font-size:14px;
    transition:border-color .2s, box-shadow .2s, transform .2s;
}

.fetch input::placeholder{
    color:rgba(255,255,255,.45);
}

.fetch input:focus{
    border-color:#0f5fff66;
    box-shadow:0 0 0 4px #0f5fff1f, 0 0 24px #0f5fff22;
    transform:translateY(-1px);
}

.fetch button{

    padding:14px 22px;

    font-size:14px;

    border-radius:18px;
    box-shadow:0 0 16px #0f5fff44;
}

.hint{
    margin:8px 2px 18px;
    font-size:12px;
    color:rgba(255,255,255,.68);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.hint b{
    color:rgba(255,255,255,.92);
}

.info{

    display:flex;

    gap:20px;

    margin-top:20px;

    flex-wrap:wrap;
}

.box{

    flex:1;

    min-width:150px;

    background:linear-gradient(180deg, rgba(11,16,34,.95), rgba(11,16,34,.72));
    border:1px solid rgba(255,255,255,.08);

    border-radius:15px;

    padding:20px;

    text-align:center;
}

.box h2{

    color:var(--blue);

    margin-bottom:5px;
}

.actions{

    display:flex;

    justify-content:center;

    margin-top:30px;
}

button{

    background:linear-gradient(45deg,var(--blue2),var(--blue));

    border:none;

    padding:18px 40px;

    color:white;

    font-size:18px;

    border-radius:60px;

    cursor:pointer;

    font-weight:700;

    transition:.3s;

    box-shadow:0 0 20px #0f5fff66;
}

button:hover{

    transform:scale(1.05);

    box-shadow:0 0 35px #0f5fff;
}

button:active{
    transform:scale(0.99);
}

button:disabled{
    opacity:.55;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

.roulette{

    margin-top:35px;

    height:90px;

    overflow:hidden;

    position:relative;

    border-radius:20px;

    background:linear-gradient(180deg, rgba(11,16,34,.95), rgba(11,16,34,.72));
    border:1px solid rgba(255,255,255,.08);

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:34px;

    font-weight:700;

    color:var(--blue);
}

.winner{

    margin-top:25px;

    text-align:center;

    font-size:42px;

    font-weight:900;

    color:var(--green);

    text-shadow:0 0 18px #00ff8866;

    animation:pulse 1s infinite alternate;
}

@keyframes pulse{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.03);
    }
}

.logs{

    margin-top:25px;

    max-height:180px;

    overflow:auto;

    background:linear-gradient(180deg, rgba(11,16,34,.95), rgba(11,16,34,.72));
    border:1px solid rgba(255,255,255,.08);

    border-radius:15px;

    padding:15px;

    font-size:13px;
}

.logs div{

    margin-bottom:8px;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{

    background:var(--blue);

    border-radius:20px;
}

@media (max-width: 680px){
    .logo{font-size:40px}
    .card{padding:22px;border-radius:20px}
    textarea{height:210px}
    .roulette{font-size:26px;height:76px}
    .winner{font-size:34px}
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="particles" id="particles"></div>

<div class="container">

<div class="logo">

ALX <span>ENTREGAS</span>

</div>

<div class="subtitle">

SORTEADOR OFICIAL DE COMENTÁRIOS

</div>

<div class="card">

<div class="hint">
<span><b>Formato:</b> usuario:comentário com @marcado</span>
<span><b>Ex:</b> alee_christos:@aleej</span>
</div>

<textarea id="comentarios" placeholder="
Cole os comentários aqui...

Exemplo:

alee_christos:@aleej
originalg2k26:@joaoguinhol46_
fulano:@ciclana

OU

alee_christos:comentou @aleej 🚀
fulano:top @ciclana
"></textarea>

<div class="info">

<div class="box">

<h2 id="totalComentarios">0</h2>

<span>Comentários válidos</span>

</div>

<div class="box">

<h2 id="participantes">0</h2>

<span>Participantes únicos</span>

</div>

<div class="box">

<h2 id="chanceExtra">Peso Inteligente</h2>

<span>Mais comentários = mais chance</span>

</div>

</div>

<div class="actions">

<button onclick="sortear()">

🎉 REALIZAR SORTEIO

</button>

</div>

<div class="roulette" id="roulette">

AGUARDANDO SORTEIO...

</div>

<div class="winner" id="winner"></div>

<div class="logs" id="logs"></div>

</div>

</div>

<script>

for(let i=0;i<120;i++){

    const span=document.createElement('span');

    span.style.left=Math.random()*100+'vw';

    span.style.animationDuration=
    (5+Math.random()*10)+'s';

    span.style.opacity=Math.random();

    document
    .getElementById('particles')
    .appendChild(span);
}

function sortear(){
    sortearLocal();
}

function pickRandomIndex(max){
    if(max<=1) return 0;
    if(window.crypto && window.crypto.getRandomValues){
        const buf=new Uint32Array(1);
        window.crypto.getRandomValues(buf);
        return buf[0] % max;
    }
    return Math.floor(Math.random()*max);
}

function parseLinhas(texto){
    const linhas=(texto||'').split('\n');
    const validos=[];

    linhas.forEach((linha)=>{
        const l=(linha||'').trim();
        if(!l) return;

        if(l.includes(':')){
            const parts=l.split(':');
            const autor=(parts.shift()||'').trim().replace(/^@/,'').toLowerCase();
            const conteudo=parts.join(':').trim();
            if(!autor) return;
            if(!/@[A-Za-z0-9_.]+/.test(conteudo)) return;
            validos.push(autor);
            return;
        }

        if(l.startsWith('@')){
            const autor=l.split(' ',1)[0].trim().replace(/^@/,'').toLowerCase();
            if(!autor) return;
            validos.push(autor);
        }
    });

    const contagem={};
    validos.forEach((u)=>{
        contagem[u]=(contagem[u]||0)+1;
    });

    return {validos, contagem};
}

function peso(qtd){
    return 1 + Math.min(qtd*0.35, 8);
}

function buildPool(contagem){
    const pool=[];
    const pesos={};
    Object.keys(contagem).forEach((user)=>{
        const p=peso(contagem[user]);
        pesos[user]=p;
        const rep=Math.max(1, Math.floor(p*10));
        for(let i=0;i<rep;i++) pool.push(user);
    });
    return {pool, pesos};
}

function renderLogs(contagem, pesos, vencedor){
    const logsEl=document.getElementById('logs');
    logsEl.innerHTML='';

    Object.keys(contagem)
    .sort((a,b)=>contagem[b]-contagem[a])
    .forEach((user)=>{
        const div=document.createElement('div');
        div.innerHTML=
        `
        👤 ${user} —
        ${contagem[user]} comentário(s) —
        Peso: ${(Number(pesos[user])||0).toFixed(2)}
        ${user===vencedor ? '🏆' : ''}
        `;
        logsEl.appendChild(div);
    });
}

function sortearLocal(){
    const texto=document.getElementById('comentarios').value;
    const roulette=document.getElementById('roulette');
    const winnerEl=document.getElementById('winner');
    const btn=document.querySelector('.actions button');

    winnerEl.innerHTML='';
    document.getElementById('logs').innerHTML='';
    roulette.innerText='PROCESSANDO...';

    btn.disabled=true;

    const {validos, contagem}=parseLinhas(texto);
    const participantes=Object.keys(contagem);

    document.getElementById('totalComentarios').innerText=validos.length;
    document.getElementById('participantes').innerText=participantes.length;

    if(participantes.length===0){
        roulette.innerText='AGUARDANDO SORTEIO...';
        btn.disabled=false;
        alert('Nenhum comentário válido encontrado.');
        return;
    }

    const {pool, pesos}=buildPool(contagem);
    let count=0;
    const interval=setInterval(()=>{
        roulette.innerText=pool[pickRandomIndex(pool.length)];
        count++;
        if(count>45){
            clearInterval(interval);
            const vencedor=pool[pickRandomIndex(pool.length)];
            roulette.innerText='🎉 '+vencedor;
            winnerEl.innerHTML=
            `
            GANHADOR<br>
            ${vencedor}
            `;
            renderLogs(contagem, pesos, vencedor);
            btn.disabled=false;
        }
    },100);
}

</script>

</body>
</html>
